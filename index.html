<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人民财讯 Monitor</title>
  <meta name="description" content="实时拉取人民财讯快讯的轻量新闻页。">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="shortcut icon" href="/favicon.svg">
  <script>
    try {
      const savedTheme = localStorage.getItem("peopleFinanceTheme");
      if (savedTheme) {
        document.documentElement.dataset.theme = savedTheme;
      }
    } catch (error) {}
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');

      --metric-border: var(--line);
      --modal-line: var(--line);
      --soft-control-border: var(--line);

      --card-foot-line: var(--line);
      --action-link: #f0823f;
      --action-link-active: #e46f2e;
      --badge-text: #f0823f;
      --smart-bg: rgba(147, 168, 94, 0.14);
      --smart-text: #93a85e;
      --max-width: 1380px;
      --shadow: 7px 7px 0 rgba(0, 0, 0, 0.42);
      --body-bg: linear-gradient(180deg, rgba(34, 26, 19, 0.42) 0%, rgba(23, 17, 13, 0) 280px), var(--bg);
      --header-bg: rgba(23, 17, 13, 0.88);
      --header-shadow: 0 1px 0 rgba(0, 0, 0, 0.36);
      --brand-shadow: 4px 4px 0 rgba(0, 0, 0, 0.45);
      --control-bg: rgba(28, 21, 16, 0.92);
      --soft-control-bg: rgba(28, 21, 16, 0.86);
      --metric-bg: rgba(34, 26, 19, 0.82);
      --brief-panel-bg: linear-gradient(135deg, rgba(34, 26, 19, 0.94), rgba(28, 21, 16, 0.98) 52%);
      --brief-panel-border: rgba(243, 228, 207, 0.18);
      --brief-action-band-bg: rgba(34, 26, 19, 0.46);

      --brief-action-border: rgba(240, 130, 63, 0.34);
      --brief-action-text: #f3e4cf;
      --brief-action-hover-border: #f0823f;
      --brief-action-shadow: 0 1px 0 rgba(240, 130, 63, 0.05);
      --brief-action-active-bg: #e46f2e;
      --brief-action-active-text: #17110d;
      --brief-metric-bg: rgba(34, 26, 19, 0.82);
      --brief-metric-border: rgba(243, 228, 207, 0.18);
      --brief-metric-label: #a8967d;
      --brief-metric-value: #f3e4cf;
      --brief-shadow: 7px 7px 0 rgba(0, 0, 0, 0.3);
      --focus-ring: rgba(228, 111, 46, 0.12);
      --ping-bg: rgba(228, 111, 46, 0.36);
      --panel-gradient: linear-gradient(135deg, rgba(34, 26, 19, 0.94), rgba(28, 21, 16, 0.98) 52%);
      --jinse-bg: linear-gradient(180deg, var(--panel-2) 0%, var(--panel) 100%);
      --jinse-border: var(--line-strong);
      --jinse-shadow: 4px 4px 0 rgba(0, 0, 0, 0.36);
      --jinse-meta: #a8967d;
      --jinse-dot: #e46f2e;
      --jinse-title: #f3e4cf;
      --jinse-summary: #d8c5aa;
      --jinse-link: #f0823f;
      --jinse-empty-text: #a8967d;
      --active-text: #17110d;
      --modal-backdrop-bg: rgba(0, 0, 0, 0.58);
      --modal-shadow: 0 32px 80px -44px rgba(0, 0, 0, 0.84);
      --success-bg: rgba(147, 168, 94, 0.14);
      --success-text: #93a85e;
      --risk-bg: rgba(215, 106, 74, 0.16);
      --risk-text: #d76a4a;
      --red-card-bg: var(--panel);
      --red-card-border: rgba(240, 130, 63, 0.58);
      --red-card-accent: #f0823f;
      --red-card-glow: rgba(228, 111, 46, 0.28);
      --red-card-sheen: rgba(240, 130, 63, 0.16);
      --red-card-title-line: rgba(240, 130, 63, 0.56);
      --red-card-shadow: 0 18px 46px -32px rgba(0, 0, 0, 0.96), 0 0 0 1px rgba(240, 130, 63, 0.16) inset;
      --signal-dot: #93a85e;
      --signal-ring: rgba(147, 168, 94, 0.12);
      --skeleton-bg: #221a13;
      --brand-icon-fill: #f3e4cf;
      --brand-icon-stroke: #e46f2e;
      --brand-icon-wave: #f3e4cf;
      --brand-icon-wave-soft: #d8c5aa;
    }

    :root[data-theme="orange-white-teal"] {
      --bg: #fffcf8;
      --bg-2: #fff7ed;
      --panel: #ffffff;
      --panel-2: #f8fafc;
      --text: #334155;
      --text-strong: #1e293b;
      --muted: #64748b;
      --faint: #475569;
      --line: #fed7aa;
      --line-strong: #b7d0cc;
      --accent: #f97316;
      --accent-2: #ea580c;
      --accent-soft: #fff7ed;
      --accent-hover: #fdba74;
      --panel-accent: #0f766e;
      --panel-accent-soft: #ecfeff;
      --panel-accent-hover: #0f766e;
      --panel-hover-border: #99f6e4;
      --content-soft: #475569;
      --intel-title: #172554;
      --intel-shadow: 0 18px 42px -34px rgba(15, 118, 110, 0.42);
      --intel-action-border: rgba(15, 118, 110, 0.3);
      --intel-action-bg: rgba(255, 255, 255, 0.82);
      --metric-border: rgba(15, 118, 110, 0.22);
      --modal-line: #dbe7e3;
      --soft-control-border: #cbd5e1;
      --news-hover-border: #fdba74;

      --smart-bg: #ecfeff;
      --smart-text: #0e7490;
      --shadow: 0 12px 35px -10px rgba(249, 115, 22, 0.12);
      --body-bg: var(--bg);
      --header-bg: rgba(255, 255, 255, 0.9);
      --header-shadow: 0 1px 3px rgba(15, 23, 42, 0.03);
      --brand-shadow: 0 10px 24px -12px rgba(249, 115, 22, 0.8);
      --control-bg: rgba(255, 255, 255, 0.92);
      --soft-control-bg: rgba(255, 255, 255, 0.86);
      --metric-bg: rgba(255, 255, 255, 0.72);
      --brief-panel-bg: #fffefa;
      --brief-panel-border: #b7d0cc;
      --brief-action-band-bg: rgba(248, 253, 251, 0.82);
      --brief-action-bg: rgba(255, 255, 255, 0.92);
      --brief-action-border: #b7d0cc;
      --brief-action-text: #0f766e;
      --brief-action-hover-border: #0f766e;
      --brief-action-shadow: 0 1px 0 rgba(15, 118, 110, 0.04);
      --brief-action-active-bg: #0f766e;
      --brief-action-active-text: #ffffff;
      --brief-metric-bg: #ffffff;
      --brief-metric-border: #c7dcd8;
      --brief-metric-label: #47656c;
      --brief-metric-value: #02063f;
      --brief-shadow: none;
      --focus-ring: rgba(249, 115, 22, 0.08);
      --ping-bg: rgba(249, 115, 22, 0.4);
      --panel-gradient: linear-gradient(135deg, rgba(240, 253, 250, 0.88), rgba(255, 255, 255, 0.94) 48%);
      --jinse-bg: linear-gradient(180deg, #fffdf8 0%, #fff8ee 100%);
      --jinse-border: #f0d6a6;
      --jinse-shadow: 0 10px 30px -18px rgba(196, 139, 37, 0.22);
      --jinse-meta: #a27b2b;
      --jinse-dot: #e4b24a;
      --jinse-title: #3b2b0c;
      --jinse-summary: #695638;
      --jinse-link: #b37b10;
      --jinse-empty-text: #8f7b58;
      --active-text: #ffffff;
      --modal-backdrop-bg: rgba(15, 23, 42, 0.34);
      --modal-shadow: 0 32px 80px -44px rgba(15, 23, 42, 0.6);
      --success-bg: #ecfdf5;
      --success-text: #047857;
      --risk-bg: #fff1f2;
      --risk-text: #be123c;
      --red-card-bg: var(--panel);
      --red-card-border: #e9a16d;
      --red-card-accent: #ea580c;
      --red-card-glow: rgba(249, 115, 22, 0.2);
      --red-card-sheen: rgba(249, 115, 22, 0.14);
      --red-card-title-line: rgba(234, 88, 12, 0.5);
      --red-card-shadow: 0 18px 40px -28px rgba(180, 83, 9, 0.34), 0 0 0 1px rgba(249, 115, 22, 0.14) inset;
      --signal-dot: #14b8a6;
      --signal-ring: rgba(20, 184, 166, 0.1);
      --skeleton-bg: #ffedd5;
      --brand-icon-fill: rgba(255, 255, 255, 0.96);

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--body-bg);
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      -webkit-font-smoothing: antialiased;
      color: var(--text);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--header-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      box-shadow: var(--header-shadow);
    }

    .header-inner,
    .main-inner,
    .footer-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      padding-left: 24px;
      padding-right: 24px;
    }

    .header-inner {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent-hover), var(--accent-2));
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--brand-shadow);
      flex: 0 0 auto;
    }

    .brand-mark svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .brand-title {
      margin: 0;
      color: var(--text-strong);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }

    .brand-title small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0;
    }

    .brand-subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 0 0 auto;
      min-width: 0;
    }

    .header-links {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .header-link-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--control-bg);
      color: var(--text-strong);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      transition: color 180ms ease, border-color 180ms ease, background 180ms ease, transform 180ms ease;
    }

    .header-link-btn:hover {
      color: var(--accent);
      border-color: var(--accent-hover);
      background: var(--accent-soft);
      transform: translateY(-1px);
    }

    .search-box {
      position: relative;
      width: 38px;
      flex: 0 0 auto;
      min-width: 0;
      transition: width 240ms ease;
    }

    .search-box:hover,
    .search-box:focus-within {
      width: 220px;
    }

    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      z-index: 1;
      width: 16px;
      height: 16px;
      color: var(--muted);
      transform: translateY(-50%);
      pointer-events: none;
      transition: color 180ms ease;
    }

    .search-box:hover .search-icon,
    .search-box:focus-within .search-icon {
      color: var(--accent);
    }

    .search-input {
      width: 100%;
      height: 38px;
      padding: 0 0 0 36px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--control-bg);
      color: var(--text);
      outline: none;
      cursor: pointer;
      transition: border-color 180ms ease, box-shadow 180ms ease, padding 240ms ease;
    }

    .search-input::placeholder {
      color: var(--muted);
      opacity: 0;
      transition: opacity 160ms ease;
    }

    .search-box:hover .search-input,
    .search-box:focus-within .search-input {
      padding-right: 14px;
      cursor: text;
    }

    .search-box:hover .search-input::placeholder,
    .search-box:focus-within .search-input::placeholder {
      opacity: 1;
    }

    .search-input:focus {
      border-color: var(--accent-hover);
      box-shadow: 0 0 0 4px var(--focus-ring);
    }

    .status-light {
      position: relative;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--accent);
    }

    .status-light::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: var(--ping-bg);
      animation: ping 1.8s ease-out infinite;
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      border: 0;
      background: transparent;
      color: var(--muted);
    }

    .icon-btn {
      width: 36px;
      border-radius: 999px;
      cursor: pointer;
      transition: color 180ms ease, background 180ms ease, transform 180ms ease;
    }

    .icon-btn:hover {
      color: var(--accent);
      background: var(--accent-soft);
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      width: 36px;
      min-height: 36px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--control-bg);
      color: var(--text-strong);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: color 180ms ease, border-color 180ms ease, background 180ms ease, transform 180ms ease;
    }

    .theme-toggle:hover {
      color: var(--accent);
      border-color: var(--accent-hover);
      background: var(--accent-soft);
      transform: translateY(-1px);
    }

    .theme-toggle svg {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
    }

    .icon-btn svg {
      width: 18px;
      height: 18px;
      transition: transform 180ms ease;
    }

    .icon-btn.is-loading svg {
      animation: spin 0.8s linear infinite;
    }

    .main-inner {
      padding-top: 20px;
      padding-bottom: 32px;
    }

    .content-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 420px;
      gap: 32px;
      align-items: start;
    }

    .content-layout > * {
      min-width: 0;
    }

    .intelligence-panel {
      display: grid;
      grid-template-columns: minmax(480px, 0.7fr) minmax(680px, 1fr);
      gap: 32px;
      align-items: center;
      margin-bottom: 18px;
      min-height: 150px;
      padding: 32px 14px;
      border: 1px solid var(--brief-panel-border);
      border-radius: 14px;
      background: var(--brief-panel-bg);
      box-shadow: var(--brief-shadow);
    }

    .intelligence-panel > * {
      min-width: 0;
    }

    .intelligence-panel > div:first-child {
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--brief-action-band-bg);
    }

    .intel-kicker,
    .section-label {
      color: var(--panel-accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .intel-headline {
      margin: 7px 0 8px;
      color: var(--intel-title);
      font-size: 24px;
      line-height: 1.38;
      font-weight: 700;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .intel-summary {
      margin: 0;
      color: var(--content-soft);
      font-size: 14px;
      line-height: 1.75;
      overflow-wrap: anywhere;
    }

    .intelligence-panel .intel-kicker,
    .intelligence-panel .intel-headline,
    .intelligence-panel .intel-summary {
      display: none;
    }

    .intel-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 0;
    }

    .intel-action-btn {
      min-height: 34px;
      padding: 0 14px;
      border: 1px solid var(--brief-action-border);
      border-radius: 999px;
      background: var(--brief-action-bg);
      color: var(--brief-action-text);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--brief-action-shadow);
      transition: background 180ms ease, border-color 180ms ease, color 180ms ease, transform 180ms ease, box-shadow 180ms ease;
    }

    .intel-action-btn:hover {
      transform: translateY(-1px);
      border-color: var(--brief-action-hover-border);
      box-shadow: 0 8px 18px -14px color-mix(in srgb, var(--brief-action-hover-border), transparent 45%);
    }

    .intel-action-btn.is-active {
      border-color: var(--brief-action-active-bg);
      background: var(--brief-action-active-bg);
      color: var(--brief-action-active-text);
    }

    .mobile-crypto-btn,
    .mobile-crypto-sort {
      display: none;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 120;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--modal-backdrop-bg);
      backdrop-filter: blur(10px);
    }

    .modal-backdrop.is-visible {
      display: flex;
    }

    .highlights-modal {
      width: min(760px, 100%);
      max-height: min(760px, calc(100svh - 48px));
      display: flex;
      flex-direction: column;
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid var(--line-strong);
      box-shadow: var(--modal-shadow);
      overflow: hidden;
      animation: modal-in 180ms ease forwards;
    }

    .modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      padding: 20px 22px 14px;
      border-bottom: 1px solid var(--modal-line);
    }

    .modal-head h2 {
      margin: 0;
      color: var(--intel-title);
      font-size: 20px;
      line-height: 1.35;
    }

    .modal-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .modal-brief-btn {
      min-height: 30px;
      padding: 0 12px;
      flex: 0 0 auto;
    }

    .modal-head p {
      margin: 5px 0 0;
      color: var(--faint);
      font-size: 13px;
      line-height: 1.6;
    }

    .modal-close {
      width: 34px;
      min-height: 34px;
      border: 0;
      border-radius: 999px;
      background: var(--panel-2);
      color: var(--muted);
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
      transition: background 180ms ease, color 180ms ease;
      flex: 0 0 auto;
    }

    .modal-close:hover {
      background: var(--panel-accent-soft);
      color: var(--panel-accent-hover);
    }

    .highlight-list {
      display: grid;
      gap: 0;
      overflow: auto;
      padding: 0 22px 18px;
    }

    .highlight-item {
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr);
      gap: 12px;
      padding: 16px 0;
      border-bottom: 1px solid var(--modal-line);
    }

    .highlight-item:last-child {
      border-bottom: 0;
    }

    .highlight-rank {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: var(--panel-accent-soft);
      color: var(--panel-accent-hover);
      font-size: 12px;
      font-weight: 800;
    }

    .highlight-title {
      margin: 0;
      color: var(--intel-title);
      font-size: 15px;
      line-height: 1.55;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .highlight-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin: 7px 0 0;
      color: var(--faint);
      font-size: 12px;
      line-height: 1.5;
    }

    .highlight-summary {
      margin: 8px 0 0;
      color: var(--content-soft);
      font-size: 13px;
      line-height: 1.75;
      overflow-wrap: anywhere;
    }

    .highlight-summary.is-collapsed {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      overflow: hidden;
    }

    .highlight-link {
      color: var(--panel-accent-hover);
      font-weight: 700;
    }

    .intel-metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      align-content: stretch;
      min-width: 0;
    }

    .intel-metric {
      min-width: 0;
      min-height: 82px;
      padding: 13px 15px;
      border-radius: 10px;
      background: var(--brief-metric-bg);
      border: 1px solid var(--brief-metric-border);
    }

    .intel-metric span {
      display: block;
      color: var(--brief-metric-label);
      font-size: 12px;
      line-height: 1.3;
    }

    .intel-metric strong {
      display: block;
      margin-top: 9px;
      color: var(--brief-metric-value);
      font-size: 20px;
      line-height: 1.1;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
      min-width: 0;
    }

    .topic-tabs,
    .sort-switch {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .topic-tabs {
      flex-wrap: wrap;
      max-width: 100%;
    }

    .sort-switch {
      justify-content: flex-end;
    }

    .topic-btn,
    .sort-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid var(--soft-control-border);
      border-radius: 999px;
      background: var(--soft-control-bg);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      line-height: 1;
      cursor: pointer;
      transition: background 180ms ease, border-color 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .topic-btn:hover,
    .sort-btn:hover {
      transform: translateY(-1px);
      border-color: var(--panel-hover-border);
      color: var(--panel-accent-hover);
    }

    .topic-btn.is-active,
    .sort-btn.is-active {
      border-color: var(--panel-accent);
      background: var(--panel-accent);
      color: var(--active-text);
    }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 28px;
    }

    .side-panel {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .jinse-list {
      display: grid;
      gap: 12px;
    }

    .jinse-card {
      min-height: 188px;
      padding: 16px 16px 14px;
      border-radius: 16px;
      border: 1px solid var(--jinse-border);
      background: var(--jinse-bg);
      box-shadow: var(--jinse-shadow);
    }

    .jinse-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      color: var(--jinse-meta);
      font-size: 12px;
    }

    .jinse-source {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
    }

    .jinse-source::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--jinse-dot);
      flex: 0 0 auto;
    }

    .jinse-card h3 {
      margin: 0 0 10px;
      color: var(--jinse-title);
      font-size: 14px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .jinse-summary {
      margin: 0;
      color: var(--jinse-summary);
      font-size: 12px;
      line-height: 1.7;
      overflow-wrap: anywhere;
    }

    .jinse-summary.is-collapsed {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 4;
      overflow: hidden;
    }

    .jinse-summary:not(.is-collapsed),
    .news-summary:not(.is-collapsed) {
      display: block;
      overflow: visible;
      -webkit-line-clamp: unset;
      -webkit-box-orient: initial;
      flex: 0 0 auto;
    }

    .jinse-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
    }

    .jinse-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 0;
      color: var(--jinse-link);
      font-size: 12px;
      font-weight: 600;
    }

    .jinse-link svg {
      width: 12px;
      height: 12px;
      flex: 0 0 auto;
    }

    .jinse-actions .summary-toggle {
      width: fit-content;
      margin-top: 0;
      margin-left: auto;
      flex: 0 0 auto;
    }

    .jinse-empty {
      padding: 24px 18px;
      border-radius: 16px;
      border: 1px solid var(--jinse-border);
      background: var(--jinse-bg);
      color: var(--jinse-empty-text);
      font-size: 13px;
      line-height: 1.7;
    }

    .news-card {
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 260px;
      padding: 24px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--panel);
      transition: all 0.3s ease;
      opacity: 0;
      transform: translateY(10px);
      animation: card-in 0.4s ease forwards;
    }

    .news-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
      border-color: var(--news-hover-border);
    }

    .news-card.is-red {
      border-color: var(--red-card-border);
      background:
        radial-gradient(180px 90px at 100% 0%, var(--red-card-sheen), transparent 62%),
        var(--red-card-bg);
      box-shadow: var(--red-card-shadow);
      overflow: hidden;
    }

    .news-card.is-red::before {
      content: "";
      position: absolute;
      top: 12px;
      right: 12px;
      width: 34px;
      height: 34px;
      border-top: 1px solid var(--red-card-accent);
      border-right: 1px solid var(--red-card-accent);
      border-top-right-radius: 12px;
      opacity: 0.58;
    }

    .news-card.is-red::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: 15px;
      box-shadow: 0 0 0 1px var(--red-card-glow) inset, 0 0 28px var(--red-card-glow) inset;
      pointer-events: none;
    }

    .news-card.is-red:hover {
      border-color: var(--red-card-accent);
      box-shadow: var(--red-card-shadow);
    }

    .news-card.is-red .news-title {
      text-decoration: underline;
      text-decoration-color: var(--red-card-title-line);
      text-decoration-thickness: 1px;
      text-underline-offset: 5px;
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .card-tags {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .source {
      font-size: 12px;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .source::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--accent);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 0 9px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--badge-text);
      font-size: 11px;
      font-weight: 700;
    }

    .badge.smart {
      background: var(--smart-bg);
      color: var(--smart-text);
    }

    .badge.risk {
      background: var(--risk-bg);
      color: var(--risk-text);
    }

    .badge.good {
      background: var(--success-bg);
      color: var(--success-text);
    }

    .side-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0;
    }

    .side-heading h2 {
      margin: 0;
      color: var(--text-strong);
      font-size: 14px;
      line-height: 1.3;
    }

    .side-heading span {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .news-title {
      margin: 0 0 12px;
      color: var(--text-strong);
      font-size: 19px;
      line-height: 1.55;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .news-title-button {
      display: inline;
      margin: 0;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      line-height: inherit;
      text-align: left;
      cursor: pointer;
      overflow-wrap: anywhere;
      transition: color 180ms ease, text-decoration-color 180ms ease;
    }

    .news-title-button:hover {
      color: var(--panel-accent-hover);
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 5px;
    }

    .news-image-link {
      display: block;
      width: 100%;
      padding: 0;
      margin: 0 0 14px;
      border-radius: 10px;
      border: 1px solid var(--card-foot-line);
      background: var(--panel-2);
      overflow: hidden;
      cursor: zoom-in;
    }

    .news-image {
      display: block;
      width: 100%;
      max-height: 360px;
      object-fit: contain;
      background: var(--panel-2);
    }

    .image-modal {
      width: min(1080px, 100%);
      max-height: min(860px, calc(100svh - 48px));
      display: flex;
      flex-direction: column;
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid var(--line-strong);
      box-shadow: var(--modal-shadow);
      overflow: hidden;
      animation: modal-in 180ms ease forwards;
    }

    .image-modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--modal-line);
    }

    .image-modal-title {
      margin: 0;
      color: var(--text-strong);
      font-size: 14px;
      line-height: 1.5;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .image-modal-body {
      display: grid;
      place-items: center;
      padding: 16px;
      overflow: auto;
      background: var(--bg);
    }

    .image-modal-body img {
      display: block;
      max-width: 100%;
      max-height: calc(100svh - 150px);
      object-fit: contain;
    }

    .jingji-article-modal {
      width: min(900px, 100%);
      max-height: min(880px, calc(100svh - 48px));
      display: flex;
      flex-direction: column;
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid var(--line-strong);
      box-shadow: var(--modal-shadow);
      overflow: hidden;
      animation: modal-in 180ms ease forwards;
    }

    .jingji-article-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      padding: 20px 22px 16px;
      border-bottom: 1px solid var(--modal-line);
    }

    .jingji-article-kicker {
      display: block;
      margin-bottom: 6px;
      color: var(--panel-accent-hover);
      font-size: 12px;
      font-weight: 700;
    }

    .jingji-article-title {
      margin: 0;
      color: var(--text-strong);
      font-size: 21px;
      line-height: 1.5;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .jingji-article-body {
      overflow: auto;
      padding: 22px 24px 32px;
      background: var(--panel);
    }

    .jingji-article-meta,
    .jingji-article-content {
      width: min(720px, 100%);
      margin-left: auto;
      margin-right: auto;
    }

    .jingji-article-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px 14px;
      margin-bottom: 20px;
      color: var(--faint);
      font-size: 12px;
    }

    .jingji-article-meta a {
      margin-left: auto;
      color: var(--action-link);
      font-weight: 700;
    }

    .jingji-article-content p {
      margin: 0 0 18px;
      color: var(--content-soft);
      font-size: 16px;
      line-height: 1.95;
      text-align: justify;
      overflow-wrap: anywhere;
    }

    .jingji-article-content img {
      display: block;
      width: 100%;
      height: auto;
      margin: 8px 0 22px;
      border-radius: 8px;
      background: var(--panel-2);
      object-fit: contain;
    }

    .jingji-article-status {
      width: min(720px, 100%);
      margin: 0 auto;
      padding: 56px 16px;
      color: var(--faint);
      font-size: 14px;
      line-height: 1.7;
      text-align: center;
    }

    .news-summary {
      margin: 0;
      color: var(--content-soft);
      font-size: 14px;
      line-height: 1.8;
      flex: 0 0 auto;
      text-align: justify;
      overflow-wrap: anywhere;
    }

    .news-summary.is-collapsed {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 6;
      overflow: hidden;
    }

    .summary-toggle {
      display: block;
      width: fit-content;
      margin-top: 10px;
      margin-left: auto;
      border: 0;
      background: transparent;
      color: var(--action-link);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
      text-align: right;
      align-self: flex-end;
    }

    .summary-toggle:hover {
      color: var(--action-link-active);
    }

    .card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 18px;
      padding-top: 2px;
    }

    .time {
      color: var(--muted);
      font-size: 12px;
    }

    .card-actions {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }

    .read-btn {
      border: 0;
      background: transparent;
      color: var(--action-link);
      font-size: 12px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      padding: 0;
    }

    .read-btn svg {
      width: 12px;
      height: 12px;
      flex: 0 0 auto;
    }

    .read-btn.is-active {
      color: var(--action-link-active);
    }

    .read-link {
      color: var(--action-link-active);
      font-size: 12px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .read-link svg {
      width: 12px;
      height: 12px;
      flex: 0 0 auto;
    }

    .skeleton-card {
      min-height: 260px;
      padding: 24px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--panel);
    }

    .skeleton {
      background: var(--skeleton-bg);
      border-radius: 6px;
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    .skeleton-line {
      height: 14px;
      margin-top: 10px;
    }

    .skeleton-line.title {
      height: 24px;
      width: 72%;
      margin-top: 20px;
    }

    .skeleton-line.short {
      width: 52%;
    }

    .empty-state {
      display: none;
      text-align: center;
      padding: 96px 20px;
      color: var(--muted);
    }

    .empty-state.is-visible {
      display: block;
    }

    .more-wrap {
      display: flex;
      justify-content: center;
      margin-top: 24px;
    }

    .side-more-wrap {
      margin-top: 4px;
      justify-content: flex-start;
    }

    .more-btn {
      min-height: 40px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      transition: background 180ms ease, transform 180ms ease;
    }

    .more-btn:hover {
      background: var(--accent-soft);
      transform: translateY(-1px);
    }

    .more-btn[hidden] {
      display: none;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    @keyframes ping {
      0% {
        transform: scale(1);
        opacity: 0.75;
      }
      100% {
        transform: scale(2.4);
        opacity: 0;
      }
    }

    @keyframes card-in {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes modal-in {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 860px) {
      .header-inner {
        min-height: auto;
        padding-top: 12px;
        padding-bottom: 12px;
        flex-wrap: wrap;
        align-items: flex-start;
      }

      .brand,
      .header-actions {
        width: 100%;
      }

      .header-actions {
        justify-content: flex-end;
      }

      .search-box {
        flex: 0 0 auto;
        width: 38px;
      }

      .search-box:hover,
      .search-box:focus-within {
        width: min(220px, 100%);
      }

      .content-layout,
      .news-grid {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .intelligence-panel {
        grid-template-columns: 1fr;
        gap: 14px;
        min-height: 0;
        padding: 18px;
      }

      .intelligence-panel > div:first-child {
        min-height: 78px;
      }

      .intel-metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .control-row {
        align-items: flex-start;
        gap: 12px;
      }

      .sort-switch {
        transform: none;
        justify-content: flex-end;
      }

      .side-heading {
        align-items: center;
        flex-wrap: wrap;
      }

      .side-panel {
        transform: none;
      }

      .side-more-wrap {
        justify-content: center;
      }

    }

    @media (max-width: 640px) {
      .site-header {
        position: sticky;
        padding-top: env(safe-area-inset-top);
        backdrop-filter: blur(12px);
      }

      .header-inner,
      .main-inner,
      .footer-inner {
        padding-left: 14px;
        padding-right: 14px;
      }

      .header-inner {
        min-height: 58px;
        gap: 10px;
        flex-wrap: nowrap;
        align-items: center;
        justify-content: space-between;
        padding-top: 8px;
        padding-bottom: 8px;
      }

      .brand {
        width: auto;
        flex: 1 1 auto;
        gap: 8px;
      }

      .brand > div:last-child {
        min-width: 0;
      }

      .brand-mark {
        width: 28px;
        height: 28px;
        border-radius: 9px;
      }

      .brand-mark svg {
        width: 16px;
        height: 16px;
      }

      .brand-title {
        display: flex;
        align-items: baseline;
        gap: 5px;
        font-size: 15px;
        line-height: 1.15;
        flex-wrap: nowrap;
        min-width: 0;
      }

      .brand-title small {
        display: inline;
        font-size: 10px;
        white-space: nowrap;
        flex: 0 0 auto;
      }

      .brand-title-text {
        display: block;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .brand-subtitle {
        display: none;
      }

      .header-actions {
        width: auto;
        flex: 0 0 auto;
        justify-content: flex-end;
        margin-left: 0;
        gap: 5px;
        flex-wrap: nowrap;
      }

      .search-box {
        display: none;
      }

      .header-links {
        display: none;
      }

      .theme-toggle {
        width: 38px;
        min-height: 38px;
        padding: 0;
        font-size: 12px;
      }

      .status-light {
        display: none;
        width: 9px;
        height: 9px;
      }

      .icon-btn {
        width: 38px;
        min-height: 38px;
      }

      .news-card,
      .skeleton-card,
      .jinse-card {
        min-height: 0;
        padding: 16px;
        border-radius: 12px;
      }

      .intelligence-panel {
        gap: 10px;
        margin-bottom: 12px;
        padding: 12px;
        border-radius: 12px;
      }

      .intelligence-panel > div:first-child {
        min-height: 0;
        flex-direction: column;
        gap: 8px;
        background: transparent;
      }

      .intel-metrics {
        display: none;
      }

      .intel-actions {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        width: 100%;
        gap: 6px;
      }

      .intel-action-btn {
        min-height: 36px;
        min-width: 0;
        padding: 0 4px;
        font-size: 11px;
        white-space: nowrap;
      }

      .mobile-crypto-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .mobile-crypto-sort {
        display: flex;
        width: 100%;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding-top: 8px;
        border-top: 1px solid var(--brief-panel-border);
      }

      .mobile-crypto-sort .sort-btn {
        min-height: 38px;
        padding: 0 18px;
        font-size: 12px;
      }

      .modal-backdrop {
        padding: 0;
      }

      .highlights-modal,
      .image-modal,
      .jingji-article-modal {
        width: 100%;
        max-height: 100svh;
        height: 100svh;
        border: 0;
        border-radius: 0;
      }

      .modal-close {
        width: 42px;
        min-height: 42px;
      }

      .modal-head {
        padding: 18px 18px 12px;
      }

      .highlight-list {
        padding: 0 18px 16px;
      }

      .jingji-article-head {
        padding: 16px 18px 13px;
      }

      .jingji-article-title {

  <script>
    (function () {
      const THEME_STORAGE_KEY = "peopleFinanceTheme";
      const THEMES = {
        "deep-coffee-gold": {
          label: "深咖金主题",
          next: "orange-white-teal"
        },
        "orange-white-teal": {
          label: "橙白青主题",
          next: "deep-coffee-gold"
        }
      };

      const state = {
        items: [],
        visibleCount: 36,
        renderedCount: 0,
        jinseItems: [],
        visibleJinseCount: 30,
        renderedJinseCount: 0,
        searchQuery: "",
        searchRules: parseSmartSearchQuery(""),
        quickFilter: "all",
        loading: false,
        speakingId: null,
        loadingSpeechId: null,
        speechAudio: null,
        speechObjectUrl: null,
        speechAbortController: null,
        articleAbortController: null,
        statusText: "正在连接实时新闻接口",
        expandedIds: new Set(),
        activeTopic: "all",
        sortMode: "smart",
        theme: normalizeTheme(document.documentElement.dataset.theme)
      };

      const BRIEF_SPEECH_ID = "brief:highlights";

      const els = {
        headerStamp: document.getElementById("headerStamp"),
        searchInput: document.getElementById("searchInput"),
        refreshBtn: document.getElementById("refreshBtn"),
        themeToggle: document.getElementById("themeToggle"),
        newsGrid: document.getElementById("newsGrid"),
        emptyState: document.getElementById("emptyState"),
        jinseMoreBtn: document.getElementById("jinseMoreBtn"),
        jinseList: document.getElementById("jinseList"),
        topicTabs: document.getElementById("topicTabs"),
        intelActions: document.getElementById("intelActions"),
        mobileCryptoBtn: document.getElementById("mobileCryptoBtn"),
        intelHeadline: document.getElementById("intelHeadline"),
        intelSummary: document.getElementById("intelSummary"),
        intelHighImpact: document.getElementById("intelHighImpact"),
        intelHotTopic: document.getElementById("intelHotTopic"),
        intelRisk: document.getElementById("intelRisk"),
        intelSources: document.getElementById("intelSources"),
        highlightsModal: document.getElementById("highlightsModal"),
        highlightsBriefBtn: document.getElementById("highlightsBriefBtn"),
        highlightsCloseBtn: document.getElementById("highlightsCloseBtn"),
        highlightsList: document.getElementById("highlightsList"),
        highlightsSubtitle: document.getElementById("highlightsSubtitle"),
        imageModal: document.getElementById("imageModal"),
        imageModalCloseBtn: document.getElementById("imageModalCloseBtn"),
        imageModalImg: document.getElementById("imageModalImg"),
        imageModalTitle: document.getElementById("imageModalTitle"),
        jingjiArticleModal: document.getElementById("jingjiArticleModal"),
        jingjiArticleCloseBtn: document.getElementById("jingjiArticleCloseBtn"),
        jingjiArticleTitle: document.getElementById("jingjiArticleTitle"),
        jingjiArticleBody: document.getElementById("jingjiArticleBody")
      };

      const TOPIC_RULES = [
        { id: "policy", label: "政策", keywords: ["国务院", "发改委", "财政部", "央行", "证监会", "交易所", "监管", "政策", "通知", "办法", "意见", "改革", "降准", "降息", "利率", "关税"] },
        { id: "ai", label: "AI科技", keywords: ["人工智能", "AI", "算力", "芯片", "半导体", "大模型", "机器人", "数据中心", "云计算", "软件", "通信", "英伟达"] },
        { id: "finance", label: "金融", keywords: ["银行", "保险", "券商", "证券", "基金", "债券", "信贷", "融资", "并购", "重组", "IPO", "上市"] },
        { id: "consumer", label: "消费医药", keywords: ["消费", "零售", "旅游", "酒店", "食品", "白酒", "医药", "医疗", "创新药", "疫苗", "生物"] },
        { id: "energy", label: "能源制造", keywords: ["新能源", "光伏", "储能", "锂电", "电池", "汽车", "电动车", "制造", "工业", "有色", "煤炭", "石油"] },
        { id: "property", label: "地产基建", keywords: ["房地产", "地产", "房贷", "城中村", "基建", "建筑", "水泥", "家居", "物业"] },
        { id: "crypto", label: "数字资产", keywords: ["比特币", "BTC", "ETH", "以太坊", "区块链", "加密", "稳定币", "ETF", "链上", "Web3"] }
      ];

      const SOURCE_FILTERS = [
        { id: "source:keji", label: "风向旗参考快讯", source: "风向旗参考快讯" },
        { id: "source:starmarket", label: "科创板日报", source: "科创板日报" },
        { id: "source:jingji-global", label: "21财经·全球", source: "21财经" }
      ];

      const HIGH_IMPACT_KEYWORDS = ["重大", "突发", "首个", "首次", "创新高", "大幅", "涨停", "跌停", "暴涨", "暴跌", "并购", "重组", "签约", "中标", "订单", "业绩", "净利", "增长", "减持", "增持", "处罚", "调查", "违约", "退市", "暂停"];
      const POSITIVE_KEYWORDS = ["增长", "提升", "创新高", "涨停", "上调", "批准", "中标", "签约", "增持", "盈利", "复苏", "突破"];
      const RISK_KEYWORDS = ["风险", "下跌", "跌停", "暴跌", "处罚", "调查", "违约", "亏损", "减持", "退市", "暂停", "召回", "预警"];

      applyTheme(state.theme);
      renderTopicTabs();

      els.refreshBtn.addEventListener("click", function () {
        loadNews(true);
      });

      els.themeToggle.addEventListener("click", function () {
        const currentTheme = normalizeTheme(state.theme);
        applyTheme(THEMES[currentTheme].next, true);
      });

      els.searchInput.addEventListener("input", function (event) {
        state.searchQuery = normalizeSearchText(event.target.value);
        state.searchRules = parseSmartSearchQuery(event.target.value);
        stopSpeech();
        refreshFilteredViews();
      });

      els.intelActions.addEventListener("click", function (event) {
        const quickButton = event.target.closest("[data-quick-filter]");
        if (quickButton) {
          setMobileCryptoMode(false);
          const nextFilter = quickButton.getAttribute("data-quick-filter") || "all";
          state.quickFilter = state.quickFilter === nextFilter ? "all" : nextFilter;
          syncIntelActionButtons();
          refreshFilteredViews();
          return;
        }

        const commandButton = event.target.closest("[data-intel-command]");
        if (!commandButton) {
          return;
        }

        const command = commandButton.getAttribute("data-intel-command");
        if (command === "read-brief") {
          toggleBriefSpeech();
        } else if (command === "show-highlights") {
          openHighlightsModal();
        } else if (command === "toggle-mobile-crypto") {
          setMobileCryptoMode(!document.body.classList.contains("mobile-crypto-mode"));
        }
      });

      els.highlightsBriefBtn.addEventListener("click", function () {
        toggleBriefSpeech();
      });

      els.highlightsCloseBtn.addEventListener("click", closeHighlightsModal);

      els.highlightsModal.addEventListener("click", function (event) {
        if (event.target === els.highlightsModal) {
          closeHighlightsModal();
        }
      });

      els.highlightsList.addEventListener("click", function (event) {
        const toggleButton = event.target.closest("[data-summary-toggle-id]");
        if (toggleButton) {
          toggleSummary(toggleButton);
        }
      });

      els.imageModalCloseBtn.addEventListener("click", closeImageModal);

      els.imageModal.addEventListener("click", function (event) {
        if (event.target === els.imageModal) {
          closeImageModal();
        }
      });

      els.jingjiArticleCloseBtn.addEventListener("click", closeJingjiArticleModal);

      els.jingjiArticleModal.addEventListener("click", function (event) {
        if (event.target === els.jingjiArticleModal) {
          closeJingjiArticleModal();
        }
      });

      window.addEventListener("keydown", function (event) {
        if (event.key !== "Escape") {
          return;
        }
        if (els.jingjiArticleModal.classList.contains("is-visible")) {
          closeJingjiArticleModal();
        } else if (els.imageModal.classList.contains("is-visible")) {
          closeImageModal();
        } else if (els.highlightsModal.classList.contains("is-visible")) {
          closeHighlightsModal();
        }
      });

      els.topicTabs.addEventListener("click", function (event) {
        const button = event.target.closest("[data-topic-id]");
        if (!button) {
          return;
        }
        state.activeTopic = button.getAttribute("data-topic-id") || "all";
        syncTopicTabs();
        refreshFilteredViews();
      });

      document.querySelectorAll("[data-sort-mode]").forEach(function (button) {
        button.addEventListener("click", function () {
          state.sortMode = button.getAttribute("data-sort-mode") || "smart";
          document.querySelectorAll("[data-sort-mode]").forEach(function (entry) {
            entry.classList.toggle(
              "is-active",
              entry.getAttribute("data-sort-mode") === state.sortMode
            );
          });
          refreshFilteredViews();
        });
      });

      els.newsGrid.addEventListener("click", function (event) {
        const articleButton = event.target.closest("[data-jingji-article-url]");
        if (articleButton) {
          openJingjiArticleModal(
            articleButton.getAttribute("data-jingji-article-url") || "",
            articleButton.getAttribute("data-jingji-article-title") || ""
          );
          return;
        }

        const imageButton = event.target.closest("[data-image-preview]");
        if (imageButton) {
          openImageModal(
            imageButton.getAttribute("data-image-preview") || "",
            imageButton.getAttribute("data-image-title") || ""
          );
          return;
        }

        const toggleButton = event.target.closest("[data-summary-toggle-id]");
        if (toggleButton) {
          toggleSummary(toggleButton);
          return;
        }

        const button = event.target.closest("[data-read-id]");
        if (!button) {
          return;
        }

        const id = button.getAttribute("data-read-id");
        toggleSpeech(id);
      });

      els.jinseList.addEventListener("click", function (event) {
        const toggleButton = event.target.closest("[data-summary-toggle-id]");
        if (toggleButton) {
          toggleSummary(toggleButton);
          return;
        }

        const button = event.target.closest("[data-read-id]");
        if (!button) {
          return;
        }

        const id = button.getAttribute("data-read-id");
        toggleSpeech(id);
      });

      els.jinseMoreBtn.addEventListener("click", function () {
        const previousJinseCount = state.visibleJinseCount;
        state.visibleJinseCount += 6;
        appendMoreJinse(previousJinseCount);
        syncJinseMoreButton();
      });

      window.addEventListener("scroll", function () {
        if (isNearPageBottom()) {
          loadMoreNews();
        }
      }, { passive: true });

      window.addEventListener("beforeunload", function () {
        stopSpeech();
      });

      loadNews(false);
      loadJinse();
      window.setInterval(function () {
        loadNews(false);
        loadJinse();
      }, 60000);

      function normalizeTheme(theme) {
        return Object.prototype.hasOwnProperty.call(THEMES, theme) ? theme : "deep-coffee-gold";
      }

      function applyTheme(theme, persist) {
        const normalizedTheme = normalizeTheme(theme);
        const themeMeta = THEMES[normalizedTheme];
        state.theme = normalizedTheme;
        document.documentElement.dataset.theme = normalizedTheme;
        els.themeToggle.setAttribute("aria-label", "当前为" + themeMeta.label + "，点击切换主题");
        els.themeToggle.setAttribute("title", "当前为" + themeMeta.label + "，点击切换主题");

        if (persist) {
          try {
            localStorage.setItem(THEME_STORAGE_KEY, normalizedTheme);
          } catch (error) {}
        }
      }

      async function loadNews(forceReset) {
        if (state.loading) {
          return;
        }

        state.loading = true;
        els.refreshBtn.classList.add("is-loading");
        setHeaderStamp("正在更新实时新闻");

        if (!state.items.length || forceReset) {

            ? Math.min(state.items.length, 36)

      async function toggleBriefSpeech() {
        if (state.speakingId === BRIEF_SPEECH_ID || state.loadingSpeechId === BRIEF_SPEECH_ID) {
          stopSpeech();
          updateSpeechButtons();
          return;
        }

        const text = buildHighlightsText(10);
        if (!text) {
          setHeaderStamp("暂无可朗读的简报");
          return;
        }

        stopSpeech();
        const controller = new AbortController();
        state.loadingSpeechId = BRIEF_SPEECH_ID;
        state.speechAbortController = controller;
        els.headerStamp.textContent = "正在生成语音";
        updateSpeechButtons();

        try {
          const response = await fetch("/api/tts-speech", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(buildTtsRequestBody(text)),
            signal: controller.signal
          });

          if (!response.ok) {
            throw new Error(await readErrorMessage(response));
          }

          const audioBlob = await response.blob();
          if (controller.signal.aborted || state.loadingSpeechId !== BRIEF_SPEECH_ID) {
            return;
          }

          releaseSpeechAudio();
          const audioUrl = URL.createObjectURL(audioBlob);
          const audio = new Audio(audioUrl);
          state.speechAudio = audio;
          state.speechObjectUrl = audioUrl;
          state.speakingId = BRIEF_SPEECH_ID;
          state.loadingSpeechId = null;
          els.headerStamp.textContent = "正在朗读";
          updateSpeechButtons();

          audio.onended = function () {
            releaseSpeechAudio();
            state.speakingId = null;
            els.headerStamp.textContent = state.statusText;
            updateSpeechButtons();
          };
          audio.onerror = function () {
            releaseSpeechAudio();
            state.speakingId = null;
            els.headerStamp.textContent = "朗读失败，请重试";
            updateSpeechButtons();
          };

          await audio.play();
        } catch (error) {
          if (controller.signal.aborted) {
            return;
          }
          console.error(error);
          state.speakingId = null;
          state.loadingSpeechId = null;
          els.headerStamp.textContent = "语音生成失败，请重试";
          updateSpeechButtons();
        } finally {
          if (state.speechAbortController === controller) {
            state.speechAbortController = null;
          }
        }
      }

      function renderJingjiArticle(payload, fallbackUrl) {
        const blocks = Array.isArray(payload.blocks) ? payload.blocks : [];

      function getHighlightItems(limit) {
        const today = getLocalDateKey(Date.now());
        const items = getAllAnalyzedItems().slice().sort(compareSmartItems);
        const todayItems = items.filter(function (item) {
          return getLocalDateKey(getSortTimestamp(item)) === today;
        });
        const scopedItems = todayItems.length ? todayItems : items;
        return Number.isFinite(limit) ? scopedItems.slice(0, limit) : scopedItems;
      }

      function createHighlightMarkup(item, index) {
        const ai = item.ai || {};
        const summary = String(item.summary || "该条快讯未提供摘要。").trim();
        const summaryId = getHighlightSummaryId(item);
        const isExpanded = state.expandedIds.has(summaryId);
        return (
          '<article class="highlight-item">' +
            '<span class="highlight-rank">' + escapeHtml(index + 1) + '</span>' +
            '<div>' +
              '<h3 class="highlight-title">' + escapeHtml(item.title || "未命名快讯") + '</h3>' +
              '<div class="highlight-meta">' +
                '<span>' + escapeHtml(item.source || "未知来源") + '</span>' +
                '<span>' + escapeHtml(formatTimeMeta(item) || item.timeLabel || "") + '</span>' +
                '<span>' + escapeHtml(ai.rankReason || ai.impact || "一般") + '</span>' +
                '<a class="highlight-link" href="' + escapeAttr(item.url || "#") + '" target="_blank" rel="noreferrer">原文</a>' +
              '</div>' +
              '<p class="highlight-summary ' + (isExpanded ? '' : 'is-collapsed') + '" data-summary-id="' + escapeAttr(summaryId) + '">' + escapeHtml(summary) + '</p>' +
              '<button class="summary-toggle" type="button" data-summary-toggle-id="' + escapeAttr(summaryId) + '">' + (isExpanded ? '收起' : '展开') + '</button>' +
            '</div>' +
          '</article>'
        );
      }

      function getHighlightSummaryId(item) {
        return "highlight:" + getSpeechId(item);
      }

      function getLocalDateKey(timestamp) {
        const date = new Date(Number(timestamp || 0));
        if (!Number.isFinite(date.getTime())) {
          return "";
        }
        return [
          date.getFullYear(),
          String(date.getMonth() + 1).padStart(2, "0"),
          String(date.getDate()).padStart(2, "0")
        ].join("-");
      }

      function buildHighlightsText(limit) {
        const items = getHighlightItems(limit);
        if (!items.length) {
          return "";
        }

        return items
          .map(function (item, index) {
            const title = String(item.title || "未命名快讯").trim();
            return title ? (index + 1) + "、" + title : "";
          })
          .filter(Boolean)
          .join("\n");
      }

      function enrichItems(items, sourceType) {
        return items.map(function (item) {
          const normalizedItem = Object.assign({}, item, {
            speechId: sourceType + ":" + String(item && item.id),
            sortTimestamp: resolveSortTimestamp(item, sourceType)
          });
          const ai = analyzeItem(normalizedItem, sourceType);
          return Object.assign(normalizedItem, { ai: ai });
        });
      }

      function analyzeItem(item, sourceType) {
        const text = normalizeAnalysisText([item.title, item.summary, item.source].join(" "));
        const topic = detectTopic(text, sourceType);
        const impactHits = collectHits(text, HIGH_IMPACT_KEYWORDS);
        const positiveHits = collectHits(text, POSITIVE_KEYWORDS);
        const riskHits = collectHits(text, RISK_KEYWORDS);
        const timestamp = getSortTimestamp(item);
        const ageMinutes = timestamp ? Math.max(0, Math.floor((Date.now() - timestamp) / 60000)) : 1440;
        const tagCount = Array.isArray(item.tags) ? item.tags.filter(function (tag) { return tag && tag.name; }).length : 0;
        const scoreReasons = [];
        let score = 20;

        if (item.isRed) {
          score += 26;
          scoreReasons.push("标红");
        }
        if (item.isTop) {
          score += 10;
          scoreReasons.push("置顶");
        }
        if (ageMinutes <= 15) {
          score += 18;
          scoreReasons.push("15分钟内");
        } else if (ageMinutes <= 60) {
          score += 12;
          scoreReasons.push("近1小时");
        } else if (ageMinutes <= 240) {
          score += 6;
          scoreReasons.push("近4小时");
        }
        if (riskHits.length) {
          score += 6;
          scoreReasons.push("风险线索");
        }
        score += Math.min(24, impactHits.length * 8);
        score += Math.min(10, tagCount * 2);
        scoreReasons.push.apply(scoreReasons, impactHits.slice(0, 2));
        if (tagCount) {
          scoreReasons.push("关联标签");
        }
        if (sourceType === "jinse") {
          score += 3;
        }

        const tone = riskHits.length > positiveHits.length ? "风险" : positiveHits.length ? "利好" : "中性";
        const impact = score >= 58 ? "高影响" : score >= 40 ? "需关注" : "一般";
        if (!scoreReasons.length && positiveHits.length) {
          scoreReasons.push("正向线索");
        }
        const rankReason = buildRankReason(impact, scoreReasons);
        const reason = buildReason(topic, rankReason);

        return {
          topicId: topic.id,
          topicLabel: topic.label,
          score: score,
          impact: impact,
          tone: tone,
          reason: reason,
          rankReason: rankReason,
          scoreReasons: scoreReasons,
          riskCount: riskHits.length,
          hits: impactHits.concat(riskHits).slice(0, 4)
        };
      }

      function resolveSortTimestamp(item, sourceType) {
        const numericTimestamp = Number(item && item.timestamp);
        const parsedTimeLabel = parseTimeLabelToday(item && item.timeLabel);
        if (sourceType === "jinse" && parsedTimeLabel) {
          if (!Number.isFinite(numericTimestamp) || numericTimestamp <= 0) {
            return parsedTimeLabel;
          }
          const normalizedNumeric = numericTimestamp < 100000000000 ? numericTimestamp * 1000 : numericTimestamp;
          if (Math.abs(normalizedNumeric - parsedTimeLabel) > 30 * 60000) {
            return parsedTimeLabel;
          }
        }

        if (Number.isFinite(numericTimestamp) && numericTimestamp > 0) {
          return numericTimestamp < 100000000000 ? numericTimestamp * 1000 : numericTimestamp;
        }

        const parsedPublishedAt = Date.parse(item && item.publishedAt);
        if (Number.isFinite(parsedPublishedAt)) {
          return parsedPublishedAt;
        }

        const parsedPublishedLabel = parseChineseDateTime(item && item.publishedLabel);
        if (parsedPublishedLabel) {
          return parsedPublishedLabel;
        }

        return parsedTimeLabel;
      }

      function getSortTimestamp(item) {
        const timestamp = Number(item && item.sortTimestamp);
        return Number.isFinite(timestamp) && timestamp > 0 ? timestamp : 0;
      }

      function parseChineseDateTime(value) {
        const match = String(value || "").match(/(\d{4})年(\d{1,2})月(\d{1,2})日\s*(\d{1,2}):(\d{1,2})/);
        if (!match) {
          return 0;
        }
        return new Date(
          Number(match[1]),
          Number(match[2]) - 1,
          Number(match[3]),
          Number(match[4]),
          Number(match[5])
        ).getTime();
      }

      function parseTimeLabelToday(value) {
        const match = String(value || "").match(/^(\d{1,2}):(\d{2})$/);
        if (!match) {
          return 0;
        }
        const now = new Date();
        const date = new Date(
          now.getFullYear(),
          now.getMonth(),
          now.getDate(),
          Number(match[1]),
          Number(match[2])
        );
        if (date.getTime() - now.getTime() > 30 * 60000) {
          date.setDate(date.getDate() - 1);
        }
        return date.getTime();
      }

      function normalizeAnalysisText(value) {
        return String(value || "").replace(/\s+/g, " ").trim();
      }

      function detectTopic(text, sourceType) {
        if (sourceType === "jinse") {
          const cryptoRule = TOPIC_RULES.find(function (rule) { return rule.id === "crypto"; });
          return cryptoRule || { id: "crypto", label: "数字资产" };
        }

        let bestRule = { id: "market", label: "市场" };
        let bestScore = 0;
        TOPIC_RULES.forEach(function (rule) {
          const score = collectHits(text, rule.keywords).length;
          if (score > bestScore) {
            bestScore = score;
            bestRule = rule;
          }
        });
        return bestRule;
      }

      function collectHits(text, keywords) {
        const normalized = String(text || "").toLowerCase();
        return keywords.filter(function (keyword) {
          return normalized.includes(String(keyword).toLowerCase());
        });
      }

      function buildRankReason(impact, scoreReasons) {
        const uniqueReasons = Array.from(new Set(scoreReasons)).slice(0, 3);
        return impact + "：" + (uniqueReasons.length ? uniqueReasons.join("、") : "常规跟踪");
      }

      function buildReason(topic, rankReason) {
        return topic.label + " · " + rankReason;
      }

      function renderIntelligence() {
        const items = getAllAnalyzedItems();
        if (!items.length) {
          els.intelHeadline.textContent = "正在分析实时快讯";
          els.intelSummary.textContent = "等待实时新闻源返回数据。";
          els.intelHighImpact.textContent = "--";
          els.intelHotTopic.textContent = "--";
          els.intelRisk.textContent = "--";
          els.intelSources.textContent = "--";
          return;
        }

        const sorted = items.slice().sort(compareSmartItems);
        const lead = sorted[0];
        const highImpactCount = items.filter(function (item) {
          return item.ai && item.ai.impact === "高影响";
        }).length;
        const riskCount = items.filter(function (item) {
          return item.ai && item.ai.riskCount > 0;
        }).length;
        const topicCounts = countBy(items, function (item) {
          return item.ai ? item.ai.topicLabel : "市场";
        });
        const hotTopic = topicCounts[0] ? topicCounts[0].name : "市场";
        const sources = new Set(items.map(function (item) { return item.source || "未知"; })).size;

        els.intelHeadline.textContent = lead.title || "最新快讯";
        els.intelSummary.textContent = buildIntelSummary(lead, highImpactCount, riskCount, hotTopic);
        els.intelHighImpact.textContent = String(highImpactCount);
        els.intelHotTopic.textContent = hotTopic;
        els.intelRisk.textContent = String(riskCount);
        els.intelSources.textContent = String(sources);
      }

      function getAllAnalyzedItems() {
        return state.items.concat(state.jinseItems).filter(function (item) {
          return item && item.ai;
        });
      }

      function countBy(items, getter) {
        const counts = new Map();
        items.forEach(function (item) {
          const name = getter(item);
          counts.set(name, (counts.get(name) || 0) + 1);
        });
        return Array.from(counts.entries())
          .map(function (entry) { return { name: entry[0], count: entry[1] }; })
          .sort(function (a, b) { return b.count - a.count; });
      }

      function buildIntelSummary(lead, highImpactCount, riskCount, hotTopic) {
        const leadText = lead.summary || lead.title || "";
        const firstSentence = String(leadText).split(/[。！？!?]/).filter(Boolean)[0] || lead.title || "";
        const clipped = firstSentence.length > 68 ? firstSentence.slice(0, 68) + "..." : firstSentence;
        const reason = lead.ai && lead.ai.rankReason ? "；排序原因：" + lead.ai.rankReason : "";
        return "高影响 " + highImpactCount + " 条，主题集中在" + hotTopic + "；风险线索 " + riskCount + " 条。重点：" + clipped + reason;
      }

      function renderTopicTabs() {
        const items = getAllAnalyzedItems();
        const counts = new Map();
        items.forEach(function (item) {
          if (item.ai && item.ai.topicId) {
            counts.set(item.ai.topicId, (counts.get(item.ai.topicId) || 0) + 1);
          }
        });
        const sourceCounts = new Map();
        state.items.forEach(function (item) {
          const source = String(item && item.source || "");
          if (source) {
            sourceCounts.set(source, (sourceCounts.get(source) || 0) + 1);
          }
        });

        const tabs = [{ id: "all", label: "全部", count: items.length }]
          .concat(SOURCE_FILTERS.map(function (filter) {
            return { id: filter.id, label: filter.label, count: sourceCounts.get(filter.source) || 0 };
          }))
          .concat(TOPIC_RULES.filter(function (rule) {
            return counts.has(rule.id);
          }).map(function (rule) {
            return { id: rule.id, label: rule.label, count: counts.get(rule.id) || 0 };
          }));

        if (state.activeTopic !== "all" && !tabs.some(function (tab) { return tab.id === state.activeTopic; })) {
          state.activeTopic = "all";
        }

        els.topicTabs.innerHTML = tabs.map(function (tab) {
          return '<button class="topic-btn ' + (tab.id === state.activeTopic ? 'is-active' : '') + '" type="button" data-topic-id="' + escapeAttr(tab.id) + '">' +
            escapeHtml(tab.label) + ' ' + escapeHtml(tab.count) +
          '</button>';
        }).join("");
      }

      function syncTopicTabs() {
        els.topicTabs.querySelectorAll("[data-topic-id]").forEach(function (button) {
          button.classList.toggle("is-active", button.getAttribute("data-topic-id") === state.activeTopic);
        });
      }

      function renderMeta(payload) {
        if (payload.isFallback) {
          state.statusText = payload.generatedAtLabel
            ? "缓存数据 · " + payload.generatedAtLabel
            : "实时失败，已回退缓存";
          setHeaderStamp(state.statusText);
          return;
        }

        state.statusText = payload.generatedAtLabel
          ? "更新于 " + payload.generatedAtLabel
          : "已完成刷新";
        setHeaderStamp(state.statusText);
      }

      function renderSkeletons() {
        els.emptyState.classList.remove("is-visible");
        els.newsGrid.innerHTML = new Array(4).fill("").map(function () {
          return (
            '<div class="skeleton-card">' +
              '<div class="skeleton skeleton-line short"></div>' +

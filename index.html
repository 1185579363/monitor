<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人民财讯 Monitor</title>
  <meta name="description" content="实时拉取人民财讯快讯的轻量新闻页。">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="shortcut icon" href="/favicon.svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');

    :root {
      --bg: #fffcf8;
      --panel: #ffffff;
      --text: #334155;
      --text-strong: #1e293b;
      --muted: #94a3b8;
      --line: #ffedd5;
      --accent: #f97316;
      --accent-soft: #fff7ed;
      --accent-hover: #fdba74;
      --max-width: 1380px;
      --shadow: 0 12px 35px -10px rgba(249, 115, 22, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      -webkit-font-smoothing: antialiased;
      color: var(--text);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.03);
    }

    .header-inner,
    .main-inner,
    .footer-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      padding-left: 24px;
      padding-right: 24px;
    }

    .header-inner {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, #fb923c, #ea580c);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 24px -12px rgba(249, 115, 22, 0.8);
      flex: 0 0 auto;
    }

    .brand-mark svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .brand-title {
      margin: 0;
      color: var(--text-strong);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }

    .brand-title small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0;
    }

    .brand-subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 0 0 auto;
      min-width: 0;
    }

    .search-box {
      width: 220px;
      flex: 0 0 auto;
      min-width: 0;
    }

    .search-input {
      width: 100%;
      height: 38px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }

    .search-input::placeholder {
      color: var(--muted);
    }

    .search-input:focus {
      border-color: #fdba74;
      box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.08);
    }

    .status-light {
      position: relative;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--accent);
    }

    .status-light::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: rgba(249, 115, 22, 0.4);
      animation: ping 1.8s ease-out infinite;
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      border: 0;
      background: transparent;
      color: var(--muted);
    }

    .icon-btn {
      width: 36px;
      border-radius: 999px;
      cursor: pointer;
      transition: color 180ms ease, background 180ms ease, transform 180ms ease;
    }

    .icon-btn:hover {
      color: var(--accent);
      background: var(--accent-soft);
    }

    .icon-btn svg {
      width: 18px;
      height: 18px;
      transition: transform 180ms ease;
    }

    .icon-btn.is-loading svg {
      animation: spin 0.8s linear infinite;
    }

    .main-inner {
      padding-top: 20px;
      padding-bottom: 32px;
    }

    .content-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 420px;
      gap: 32px;
      align-items: start;
    }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 28px;
    }

    .side-panel {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .jinse-list {
      display: grid;
      gap: 12px;
    }

    .jinse-card {
      min-height: 188px;
      padding: 16px 16px 14px;
      border-radius: 16px;
      border: 1px solid #f8e7c8;
      background: linear-gradient(180deg, #fffdf8 0%, #fff8ee 100%);
      box-shadow: 0 10px 30px -18px rgba(196, 139, 37, 0.22);
    }

    .jinse-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      color: #a27b2b;
      font-size: 12px;
    }

    .jinse-source {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
    }

    .jinse-source::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #e4b24a;
      flex: 0 0 auto;
    }

    .jinse-card h3 {
      margin: 0 0 10px;
      color: #3b2b0c;
      font-size: 14px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .jinse-summary {
      margin: 0;
      color: #695638;
      font-size: 12px;
      line-height: 1.7;
      overflow-wrap: anywhere;
    }

    .jinse-summary.is-collapsed {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 4;
      overflow: hidden;
    }

    .jinse-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
    }

    .jinse-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 0;
      color: #b37b10;
      font-size: 12px;
      font-weight: 600;
    }

    .jinse-link svg {
      width: 12px;
      height: 12px;
      flex: 0 0 auto;
    }

    .jinse-actions .summary-toggle {
      width: fit-content;
      margin-top: 0;
      margin-left: auto;
      flex: 0 0 auto;
    }

    .jinse-empty {
      padding: 24px 18px;
      border-radius: 16px;
      border: 1px solid #f8e7c8;
      background: linear-gradient(180deg, #fffdf8 0%, #fff8ee 100%);
      color: #8f7b58;
      font-size: 13px;
      line-height: 1.7;
    }

    .news-card {
      display: flex;
      flex-direction: column;
      min-height: 260px;
      padding: 24px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--panel);
      transition: all 0.3s ease;
      opacity: 0;
      transform: translateY(10px);
      animation: card-in 0.4s ease forwards;
    }

    .news-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
      border-color: var(--accent-hover);
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .source {
      font-size: 12px;
      color: #94a3b8;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .source::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--accent);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 0 9px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #ea580c;
      font-size: 11px;
      font-weight: 700;
    }

    .news-title {
      margin: 0 0 12px;
      color: var(--text-strong);
      font-size: 19px;
      line-height: 1.55;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .news-summary {
      margin: 0;
      color: #475569;
      font-size: 14px;
      line-height: 1.8;
      flex: 1 1 auto;
      text-align: justify;
      overflow-wrap: anywhere;
    }

    .news-summary.is-collapsed {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 6;
      overflow: hidden;
    }

    .summary-toggle {
      display: block;
      width: fit-content;
      margin-top: 10px;
      margin-left: auto;
      border: 0;
      background: transparent;
      color: #f97316;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
      text-align: right;
      align-self: flex-end;
    }

    .summary-toggle:hover {
      color: #ea580c;
    }

    .card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid #fff3e8;
    }

    .time {
      color: #94a3b8;
      font-size: 12px;
    }

    .card-actions {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }

    .read-btn {
      border: 0;
      background: transparent;
      color: #f97316;
      font-size: 12px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      padding: 0;
    }

    .read-btn svg {
      width: 12px;
      height: 12px;
      flex: 0 0 auto;
    }

    .read-btn.is-active {
      color: #ea580c;
    }

    .read-link {
      color: #ea580c;
      font-size: 12px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .read-link svg {
      width: 12px;
      height: 12px;
      flex: 0 0 auto;
    }

    .skeleton-card {
      min-height: 260px;
      padding: 24px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .skeleton {
      background: #ffedd5;
      border-radius: 6px;
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    .skeleton-line {
      height: 14px;
      margin-top: 10px;
    }

    .skeleton-line.title {
      height: 24px;
      width: 72%;
      margin-top: 20px;
    }

    .skeleton-line.short {
      width: 52%;
    }

    .empty-state {
      display: none;
      text-align: center;
      padding: 96px 20px;
      color: #94a3b8;
    }

    .empty-state.is-visible {
      display: block;
    }

    .more-wrap {
      display: flex;
      justify-content: center;
      margin-top: 24px;
    }

    .side-more-wrap {
      margin-top: 4px;
      justify-content: flex-start;
    }

    .more-btn {
      min-height: 40px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      cursor: pointer;
      transition: background 180ms ease, transform 180ms ease;
    }

    .more-btn:hover {
      background: var(--accent-soft);
      transform: translateY(-1px);
    }

    .more-btn[hidden] {
      display: none;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    @keyframes ping {
      0% {
        transform: scale(1);
        opacity: 0.75;
      }
      100% {
        transform: scale(2.4);
        opacity: 0;
      }
    }

    @keyframes card-in {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 860px) {
      .header-inner {
        min-height: auto;
        padding-top: 12px;
        padding-bottom: 12px;
        flex-wrap: wrap;
        align-items: flex-start;
      }

      .brand,
      .header-actions {
        width: 100%;
      }

      .header-actions {
        justify-content: flex-end;
      }

      .search-box {
        flex: 1 1 auto;
        width: auto;
      }

      .content-layout,
      .news-grid {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .side-more-wrap {
        justify-content: center;
      }

    }

    @media (max-width: 640px) {
      .site-header {
        position: static;
        backdrop-filter: none;
      }

      .header-inner,
      .main-inner,
      .footer-inner {
        padding-left: 14px;
        padding-right: 14px;
      }

      .header-inner {
        gap: 10px;
      }

      .brand {
        gap: 10px;
      }

      .brand-mark {
        width: 28px;
        height: 28px;
        border-radius: 9px;
      }

      .brand-mark svg {
        width: 16px;
        height: 16px;
      }

      .brand-title {
        font-size: 16px;
        gap: 6px;
      }

      .brand-title small {
        font-size: 11px;
      }

      .brand-subtitle {
        display: none;
      }

      .header-actions {
        gap: 10px;
      }

      .search-box {
        display: none;
      }

      .status-light {
        width: 10px;
        height: 10px;
      }

      .icon-btn {
        width: 34px;
        min-height: 34px;
      }

      .news-card,
      .skeleton-card,
      .jinse-card {
        min-height: 0;
        padding: 18px;
      }

      .news-title {
        font-size: 18px;
      }

      .news-summary {
        font-size: 13px;
        line-height: 1.75;
      }

      .jinse-card h3 {
        font-size: 13px;
      }

      .jinse-summary {
        font-size: 12px;
        line-height: 1.65;
      }

      .card-foot {
        flex-direction: column;
        align-items: flex-start;
      }

      .card-actions,
      .jinse-actions {
        width: 100%;
      }

      .card-actions {
        justify-content: space-between;
        margin-left: 0;
      }

      .jinse-actions {
        gap: 10px;
      }

      .jinse-actions .summary-toggle {
        margin-left: 0;
      }

      .more-wrap {
        margin-top: 18px;
      }

      .empty-state {
        padding: 52px 16px;
      }
    }

    @media (max-width: 420px) {
      .brand-title {
        flex-direction: column;
        align-items: flex-start;
        gap: 2px;
      }

      .header-actions {
        display: flex;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <rect x="4.25" y="5" width="10.5" height="14" rx="3" fill="rgba(255,255,255,0.96)"/>
            <path d="M8 9.25H11.5" stroke="#F97316" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M8 12H11.5" stroke="#F97316" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M8 14.75H10.75" stroke="#F97316" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M17.25 8.5C18.45 9.5 19 10.67 19 12C19 13.33 18.45 14.5 17.25 15.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M19.5 6.25C21.24 7.92 22 9.84 22 12C22 14.16 21.24 16.08 19.5 17.75" stroke="rgba(255,255,255,0.82)" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <h1 class="brand-title">每日股市快讯 <small>7*24小时快讯</small></h1>
          <div class="brand-subtitle" id="headerStamp">正在连接实时新闻接口</div>
        </div>
      </div>
      <div class="header-actions">
        <label class="search-box" for="searchInput">
          <input class="search-input" id="searchInput" type="search" placeholder="搜索新闻" autocomplete="off">
        </label>
        <span class="status-light" aria-hidden="true"></span>
        <button class="icon-btn" id="refreshBtn" type="button" aria-label="刷新新闻">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 0 0 4.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 0 1-15.357-2m15.357 2H15"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div class="main-inner">
      <div class="content-layout">
        <section>
          <div class="news-grid" id="newsGrid"></div>
          <div class="empty-state" id="emptyState">暂无最新数据</div>
        </section>

        <aside class="side-panel">
          <div class="jinse-list" id="jinseList"></div>
          <div class="more-wrap side-more-wrap">
            <button class="more-btn" id="jinseMoreBtn" type="button" hidden>加载更多</button>
          </div>
        </aside>
      </div>
      <div class="more-wrap">
        <button class="more-btn" id="moreBtn" type="button">加载更多</button>
      </div>
    </div>
  </main>

  <script>
    (function () {
      const state = {
        items: [],
        visibleCount: 36,
        renderedCount: 0,
        jinseItems: [],
        visibleJinseCount: 30,
        renderedJinseCount: 0,
        searchQuery: "",
        loading: false,
        speakingId: null,
        statusText: "正在连接实时新闻接口",
        expandedIds: new Set()
      };

      const els = {
        headerStamp: document.getElementById("headerStamp"),
        searchInput: document.getElementById("searchInput"),
        refreshBtn: document.getElementById("refreshBtn"),
        newsGrid: document.getElementById("newsGrid"),
        emptyState: document.getElementById("emptyState"),
        moreBtn: document.getElementById("moreBtn"),
        jinseMoreBtn: document.getElementById("jinseMoreBtn"),
        jinseList: document.getElementById("jinseList")
      };

      els.refreshBtn.addEventListener("click", function () {
        loadNews(true);
      });

      els.searchInput.addEventListener("input", function (event) {
        state.searchQuery = normalizeSearchText(event.target.value);
        stopSpeech();
        state.renderedCount = 0;
        state.renderedJinseCount = 0;
        renderList(true);
        renderJinse(true);
        syncMoreButton();
        syncJinseMoreButton();
      });

      els.newsGrid.addEventListener("click", function (event) {
        const toggleButton = event.target.closest("[data-summary-toggle-id]");
        if (toggleButton) {
          toggleSummary(toggleButton.getAttribute("data-summary-toggle-id"));
          return;
        }

        const button = event.target.closest("[data-read-id]");
        if (!button) {
          return;
        }

        const id = button.getAttribute("data-read-id");
        toggleSpeech(id);
      });

      els.jinseList.addEventListener("click", function (event) {
        const toggleButton = event.target.closest("[data-summary-toggle-id]");
        if (!toggleButton) {
          return;
        }
        toggleSummary(toggleButton.getAttribute("data-summary-toggle-id"));
      });

      els.moreBtn.addEventListener("click", function () {
        const previousCount = state.visibleCount;
        const previousJinseCount = state.visibleJinseCount;
        state.visibleCount += 12;
        state.visibleJinseCount += 6;
        appendMoreItems(previousCount);
        appendMoreJinse(previousJinseCount);
        syncMoreButton();
        syncJinseMoreButton();
      });

      els.jinseMoreBtn.addEventListener("click", function () {
        const previousJinseCount = state.visibleJinseCount;
        state.visibleJinseCount += 6;
        appendMoreJinse(previousJinseCount);
        syncMoreButton();
        syncJinseMoreButton();
      });

      window.addEventListener("beforeunload", function () {
        stopSpeech();
      });

      loadNews(false);
      loadJinse();
      window.setInterval(function () {
        loadNews(false);
        loadJinse();
      }, 60000);

      async function loadNews(forceReset) {
        if (state.loading) {
          return;
        }

        state.loading = true;
        els.refreshBtn.classList.add("is-loading");
        els.headerStamp.textContent = "正在更新实时新闻";

        if (!state.items.length || forceReset) {
          renderSkeletons();
        }

        try {
          const currentVisibleCount = state.visibleCount || 36;
          const response = await fetch("/api/news?pages=8", { cache: "no-store" });
          if (!response.ok) {
            throw new Error("HTTP " + response.status);
          }

          const payload = await response.json();
          stopSpeech();
          state.items = Array.isArray(payload.items) ? payload.items : [];
          state.visibleCount = forceReset
            ? Math.min(state.items.length, 36)
            : Math.min(state.items.length, Math.max(currentVisibleCount, 36));
          state.renderedCount = 0;
          state.expandedIds = new Set();
          renderMeta(payload);
          renderList(true);
          syncMoreButton();
          syncJinseMoreButton();
        } catch (error) {
          els.headerStamp.textContent = "实时接口请求失败";
          if (!state.items.length) {
            els.newsGrid.innerHTML = "";
            els.emptyState.textContent = "实时接口请求失败，请稍后刷新或检查部署日志";
            els.emptyState.classList.add("is-visible");
          }
          syncMoreButton();
          syncJinseMoreButton();
          console.error(error);
        } finally {
          state.loading = false;
          els.refreshBtn.classList.remove("is-loading");
        }
      }

      async function loadJinse() {
        try {
          const currentVisibleJinseCount = state.visibleJinseCount || 30;
          const response = await fetch("/api/jinse?limit=50&t=" + Date.now(), { cache: "no-store" });
          if (!response.ok) {
            throw new Error("HTTP " + response.status);
          }
          const payload = await response.json();
          state.jinseItems = Array.isArray(payload.items) ? payload.items : [];
          state.visibleJinseCount = Math.min(
            state.jinseItems.length,
            Math.max(currentVisibleJinseCount, 30)
          );
          if (state.searchQuery) {
            els.jinseList.innerHTML = '<div class="jinse-empty">未找到相关金色财经新闻。</div>';
          }
          state.renderedJinseCount = 0;
          renderJinse(true);
          syncMoreButton();
          syncJinseMoreButton();
        } catch (error) {
          state.jinseItems = [];
          state.visibleJinseCount = 0;
          state.renderedJinseCount = 0;
          renderJinse(true);
          syncMoreButton();
          syncJinseMoreButton();
          console.error(error);
        }
      }

      function renderMeta(payload) {
        if (payload.isFallback) {
          state.statusText = payload.generatedAtLabel
            ? "缓存数据 · " + payload.generatedAtLabel
            : "实时失败，已回退缓存";
          els.headerStamp.textContent = state.statusText;
          return;
        }

        state.statusText = payload.generatedAtLabel
          ? "更新于 " + payload.generatedAtLabel
          : "已完成刷新";
        els.headerStamp.textContent = state.statusText;
      }

      function renderSkeletons() {
        els.emptyState.classList.remove("is-visible");
        els.newsGrid.innerHTML = new Array(4).fill("").map(function () {
          return (
            '<div class="skeleton-card">' +
              '<div class="skeleton skeleton-line short"></div>' +
              '<div class="skeleton skeleton-line title"></div>' +
              '<div class="skeleton skeleton-line"></div>' +
              '<div class="skeleton skeleton-line"></div>' +
              '<div class="skeleton skeleton-line short"></div>' +
            '</div>'
          );
        }).join("");
      }

      function renderJinse(forceFullRender) {
        const filteredItems = getFilteredJinseItems();
        if (!filteredItems.length) {
          els.jinseList.innerHTML =
            '<div class="jinse-empty">暂时没有抓到金色财经快讯，请稍后自动刷新。</div>';
          state.renderedJinseCount = 0;
          syncJinseMoreButton();
          return;
        }

        const visibleItems = filteredItems.slice(0, state.visibleJinseCount);
        if (forceFullRender) {
          els.jinseList.innerHTML = visibleItems.map(function (item) {
            return createJinseCardMarkupEnhanced(item);
          }).join("");
          state.renderedJinseCount = visibleItems.length;
          syncSummaryToggles(els.jinseList);
        }
        syncJinseMoreButton();
      }

      function appendMoreJinse(previousCount) {
        const filteredItems = getFilteredJinseItems();
        if (!filteredItems.length) {
          return;
        }

        const visibleItems = filteredItems.slice(0, state.visibleJinseCount);
        const nextItems = visibleItems.slice(previousCount);
        if (!nextItems.length) {
          return;
        }

        const fragment = document.createRange().createContextualFragment(
          nextItems.map(function (item) {
            return createJinseCardMarkupEnhanced(item);
          }).join("")
        );
        els.jinseList.appendChild(fragment);
        state.renderedJinseCount = visibleItems.length;
        syncSummaryToggles(els.jinseList);
        syncJinseMoreButton();
      }

      function renderList(forceFullRender) {
        const filteredItems = getFilteredNewsItems();
        if (!filteredItems.length) {
          els.newsGrid.innerHTML = "";
          els.emptyState.textContent = "暂无最新数据";
          if (state.searchQuery) {
            els.emptyState.textContent = "未找到相关新闻";
          }
          els.emptyState.classList.add("is-visible");
          state.renderedCount = 0;
          syncMoreButton();
          return;
        }

        els.emptyState.classList.remove("is-visible");
        const visibleItems = filteredItems.slice(0, state.visibleCount);
        if (forceFullRender) {
          els.newsGrid.innerHTML = visibleItems.map(function (item, index) {
            return createNewsCardMarkup(item, index);
          }).join("");
          state.renderedCount = visibleItems.length;
          syncSummaryToggles(els.newsGrid);
        }
        syncMoreButton();
      }

      function appendMoreItems(previousCount) {
        const filteredItems = getFilteredNewsItems();
        if (!filteredItems.length) {
          return;
        }

        const visibleItems = filteredItems.slice(0, state.visibleCount);
        const nextItems = visibleItems.slice(previousCount);
        if (!nextItems.length) {
          els.moreBtn.hidden = visibleItems.length >= filteredItems.length;
          return;
        }

        els.emptyState.classList.remove("is-visible");
        const fragment = document.createRange().createContextualFragment(
          nextItems.map(function (item, offset) {
            return createNewsCardMarkup(item, previousCount + offset);
          }).join("")
        );
        els.newsGrid.appendChild(fragment);
        state.renderedCount = visibleItems.length;
        syncSummaryToggles(els.newsGrid);
        syncMoreButton();
      }

      function createJinseCardMarkup(item) {
        return (
          '<article class="jinse-card">' +
            '<div class="jinse-meta">' +
              '<span class="jinse-source">金色财经</span>' +
              '<span>' + escapeHtml(item.timeLabel || "") + '</span>' +
            '</div>' +
            '<h3>' + escapeHtml(item.title) + '</h3>' +
            '<p>' + escapeHtml(item.summary || "暂无摘要") + '</p>' +
            '<a class="jinse-link" href="' + escapeAttr(item.url) + '" target="_blank" rel="noreferrer">原文' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
                '<path stroke-linecap="round" stroke-linejoin="round" d="M7 17L17 7M17 7H9M17 7v8"/>' +
              '</svg>' +
            '</a>' +
          '</article>'
        );
      }

      function createJinseCardMarkupEnhanced(item) {
        const shouldCollapse = shouldCollapseJinseSummary(item.summary);
        const isExpanded = state.expandedIds.has(item.id);
        return (
          '<article class="jinse-card">' +
            '<div class="jinse-meta">' +
              '<span class="jinse-source">金色财经</span>' +
              '<span>' + escapeHtml(item.timeLabel || "") + '</span>' +
            '</div>' +
            '<h3>' + escapeHtml(item.title) + '</h3>' +
            '<p class="jinse-summary ' + (shouldCollapse && !isExpanded ? 'is-collapsed' : '') + '" data-summary-id="' + escapeAttr(item.id) + '">' + escapeHtml(item.summary || "暂无摘要") + '</p>' +
            '<div class="jinse-actions">' +
              '<a class="jinse-link" href="' + escapeAttr(item.url) + '" target="_blank" rel="noreferrer">原文' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
                  '<path stroke-linecap="round" stroke-linejoin="round" d="M7 17L17 7M17 7H9M17 7v8"/>' +
                '</svg>' +
              '</a>' +
              (shouldCollapse
                ? '<button class="summary-toggle" type="button" data-summary-toggle-id="' + escapeAttr(item.id) + '">' + (isExpanded ? '收起' : '展开') + '</button>'
                : '') +
            '</div>' +
          '</article>'
        );
      }

      function createNewsCardMarkup(item, index) {
        const shouldCollapse = shouldCollapseSummary(item.summary);
        const isExpanded = state.expandedIds.has(item.id);
        return (
          '<article class="news-card" style="animation-delay:' + Math.min(index * 35, 350) + 'ms">' +
            '<div class="card-head">' +
              '<span class="source">' + escapeHtml(item.source) + '</span>' +
              (item.isRed ? '<span class="badge">标红</span>' : '') +
            '</div>' +
            '<h3 class="news-title">' + escapeHtml(item.title) + '</h3>' +
            '<p class="news-summary ' + (shouldCollapse && !isExpanded ? 'is-collapsed' : '') + '" data-summary-id="' + escapeAttr(item.id) + '">' + escapeHtml(item.summary || "该条快讯未提供摘要。") + '</p>' +
            (shouldCollapse
              ? '<button class="summary-toggle" type="button" data-summary-toggle-id="' + escapeAttr(item.id) + '">' + (isExpanded ? '收起' : '展开') + '</button>'
              : '') +
            '<div class="card-foot">' +
              '<span class="time">' + escapeHtml(formatTimeMeta(item)) + '</span>' +
              '<div class="card-actions">' +
                '<button class="read-btn ' + (state.speakingId === item.id ? 'is-active' : '') + '" type="button" data-read-id="' + escapeAttr(item.id) + '">' +
                  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
                    '<path stroke-linecap="round" stroke-linejoin="round" d="M11 5L6 9H3v6h3l5 4V5z"/>' +
                    '<path stroke-linecap="round" stroke-linejoin="round" d="M15.5 8.5a5 5 0 0 1 0 7"/>' +
                    '<path stroke-linecap="round" stroke-linejoin="round" d="M18.5 6a8.5 8.5 0 0 1 0 12"/>' +
                  '</svg>' +
                  (state.speakingId === item.id ? '停止' : '朗读') +
                '</button>' +
                '<a class="read-link" href="' + escapeAttr(item.url) + '" target="_blank" rel="noreferrer">原文' +
                  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
                    '<path stroke-linecap="round" stroke-linejoin="round" d="M7 17L17 7M17 7H9M17 7v8"/>' +
                  '</svg>' +
                '</a>' +
              '</div>' +
            '</div>' +
          '</article>'
        );
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function escapeAttr(value) {
        return escapeHtml(value);
      }

      function normalizeSearchText(value) {
        return String(value || "").trim().toLowerCase();
      }

      function matchesSearch(item) {
        if (!state.searchQuery) {
          return true;
        }
        const haystack = [
          item && item.title,
          item && item.summary,
          item && item.source
        ].join(" ").toLowerCase();
        return haystack.includes(state.searchQuery);
      }

      function getFilteredNewsItems() {
        return state.items.filter(matchesSearch);
      }

      function getFilteredJinseItems() {
        return state.jinseItems.filter(matchesSearch);
      }

      function shouldCollapseSummary(summary) {
        return String(summary || "").trim().length > 180;
      }

      function shouldCollapseJinseSummary(summary) {
        return String(summary || "").trim().length > 88;
      }

      function formatTimeMeta(item) {
        const baseLabel = item.publishedLabel || "";
        const relativeLabel = getRelativeMinutesLabel(item);
        return relativeLabel ? baseLabel + " · " + relativeLabel : baseLabel;
      }

      function getRelativeMinutesLabel(item) {
        const timestamp = Number(item.timestamp || 0);
        if (!timestamp) {
          return "";
        }

        const diffMs = Date.now() - timestamp;
        if (diffMs < 0) {
          return "刚刚";
        }

        const diffMinutes = Math.floor(diffMs / 60000);
        if (diffMinutes < 1) {
          return "刚刚";
        }
        if (diffMinutes < 60) {
          return diffMinutes + " 分钟前";
        }

        const diffHours = Math.floor(diffMinutes / 60);
        if (diffHours < 24) {
          return diffHours + " 小时前";
        }

        const diffDays = Math.floor(diffHours / 24);
        return diffDays + " 天前";
      }

      function toggleSpeech(id) {
        if (!("speechSynthesis" in window)) {
          els.headerStamp.textContent = "当前浏览器不支持朗读";
          return;
        }

        if (state.speakingId === id) {
          stopSpeech();
          updateSpeechButtons();
          return;
        }

        const item = state.items.find(function (entry) {
          return entry.id === id;
        });
        if (!item) {
          return;
        }

        stopSpeech();
        const utterance = new SpeechSynthesisUtterance(
          item.title + "。" + (item.summary || "该条快讯未提供摘要。")
        );
        utterance.lang = "zh-CN";
        utterance.rate = 1;
        utterance.pitch = 1;
        utterance.onend = function () {
          state.speakingId = null;
          els.headerStamp.textContent = state.statusText;
          updateSpeechButtons();
        };
        utterance.onerror = function () {
          state.speakingId = null;
          els.headerStamp.textContent = "朗读失败，请重试";
          updateSpeechButtons();
        };

        const voice = window.speechSynthesis.getVoices().find(function (entry) {
          return (entry.lang || "").toLowerCase().includes("zh");
        });
        if (voice) {
          utterance.voice = voice;
        }

        state.speakingId = id;
        window.speechSynthesis.speak(utterance);
        els.headerStamp.textContent = "正在朗读";
        updateSpeechButtons();
      }

      function stopSpeech() {
        if ("speechSynthesis" in window) {
          window.speechSynthesis.cancel();
        }
        state.speakingId = null;
        els.headerStamp.textContent = state.statusText;
      }

      function updateSpeechButtons() {
        els.newsGrid.querySelectorAll("[data-read-id]").forEach(function (button) {
          const active = button.getAttribute("data-read-id") === state.speakingId;
          button.classList.toggle("is-active", active);
          button.lastChild.textContent = active ? "停止" : "朗读";
        });
      }

      function syncSummaryToggles(container) {
        if (!container) {
          return;
        }

        container.querySelectorAll("[data-summary-toggle-id]").forEach(function (toggle) {
          const id = toggle.getAttribute("data-summary-toggle-id");
          const summary = container.querySelector('[data-summary-id="' + cssEscape(id) + '"]');
          if (!summary) {
            toggle.hidden = true;
            return;
          }

          const isExpanded = state.expandedIds.has(id);
          summary.classList.add("is-collapsed");
          const needsToggle = summary.scrollHeight - summary.clientHeight > 1;

          if (!needsToggle) {
            state.expandedIds.delete(id);
            summary.classList.remove("is-collapsed");
            toggle.hidden = true;
            return;
          }

          toggle.hidden = false;
          if (isExpanded) {
            summary.classList.remove("is-collapsed");
            toggle.textContent = "收起";
          } else {
            summary.classList.add("is-collapsed");
            toggle.textContent = "展开";
          }
        });
      }

      function syncMoreButton() {
        const hasMoreNews = getFilteredNewsItems().length > state.visibleCount;
        const hasMoreJinse = getFilteredJinseItems().length > state.visibleJinseCount;
        els.moreBtn.hidden = !hasMoreNews && !hasMoreJinse;
      }

      function syncJinseMoreButton() {
        els.jinseMoreBtn.hidden = getFilteredJinseItems().length <= state.visibleJinseCount;
      }

      function toggleSummary(id) {
        if (!id) {
          return;
        }

        const summary = document.querySelector('[data-summary-id="' + cssEscape(id) + '"]');
        const toggle = document.querySelector('[data-summary-toggle-id="' + cssEscape(id) + '"]');
        if (!summary || !toggle) {
          return;
        }

        if (state.expandedIds.has(id)) {
          state.expandedIds.delete(id);
          summary.classList.add("is-collapsed");
          toggle.textContent = "展开";
        } else {
          state.expandedIds.add(id);
          summary.classList.remove("is-collapsed");
          toggle.textContent = "收起";
        }
      }

      function cssEscape(value) {
        if (window.CSS && typeof window.CSS.escape === "function") {
          return window.CSS.escape(value);
        }
        return String(value).replace(/["\\]/g, "\\$&");
      }
    })();
  </script>
</body>
</html>
